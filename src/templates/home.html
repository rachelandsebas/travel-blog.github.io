<!DOCTYPE html>
<html lang="{{LANG}}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&R Travel Blog</title>
  <meta name="description" content="A minimalist travel blog covering adventures around the world.">
  <link rel="stylesheet" href="{{ASSET_PATH}}assets/index.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>

<body>
  {{BURGER_MENU}}

  <div class="container">
    <nav>
      <div class="nav-left">
        <button class="burger-menu-btn" id="burger-menu-btn">&#9776;</button>
        <a href="{{SITE_ROOT}}" class="logo">S&R Travel Blog</a>
      </div>
      <div class="lang-switch">
        <a href="{{EN_URL}}" class="{{EN_ACTIVE}}">EN</a>
        <a href="{{ES_URL}}" class="{{ES_ACTIVE}}">ES</a>
      </div>
    </nav>

    <main>
      <section class="hero">
        <h1>{{HERO_TITLE}}</h1>
        <p>{{HERO_SUBTITLE}}</p>
      </section>

      {{ITINERARY_SECTION}}

      <section class="posts-grid">
        {{POSTS}}
      </section>

      {{TIMELINE_SECTION}}

      <!-- World Map Section -->
      <section class="world-map">
        <h2>Travel Map</h2>
        <div id="world-map" class="map-container"></div>
        
        <div class="travel-stats">
          <div class="stat-item">
            <div class="progress-circle">
              <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg"
                  d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <path id="countries-progress" class="circle"
                  stroke-dasharray="0, 100"
                  d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <text x="18" y="20.35" class="percentage" id="countries-pct">0%</text>
              </svg>
            </div>
            <div class="stat-info">
              <span class="stat-label" id="label-countries-visited">Countries Visited</span>
              <span class="stat-value" id="countries-count">0/195</span>
            </div>
          </div>

          <div class="stat-item">
            <div class="progress-circle">
              <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg"
                  d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <path id="population-progress" class="circle"
                  stroke-dasharray="0, 100"
                  d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <text x="18" y="20.35" class="percentage" id="population-pct">0%</text>
              </svg>
            </div>
            <div class="stat-info">
              <span class="stat-label" id="label-population-visited">World Population</span>
              <span class="stat-value" id="population-count">0%</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Modal for country posts -->
      <div id="country-modal" class="modal hidden">
        <div class="modal-content">
          <span class="close" id="modal-close">&times;</span>
          <h2 id="modal-country"></h2>
          <ul id="modal-posts"></ul>
        </div>
      </div>

    </main>

    <footer>
      &copy; 2026 Travel Blog. All rights reserved.
    </footer>
  </div>

  <script>window.BASE_URL = '{{BASE_URL_JS}}';</script>
<script src="{{ASSET_PATH}}assets/main.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="{{ASSET_PATH}}assets/map.js"></script>
</body>

</html>
