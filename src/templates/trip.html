<!DOCTYPE html>
<html lang="{{LANG}}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TRIP_TITLE}} | S&R Travel Blog</title>
  <meta name="description" content="Posts for the trip: {{TRIP_TITLE}}">
  <link rel="stylesheet" href="{{ASSET_PATH}}assets/index.css">
</head>

<body>
  {{BURGER_MENU}}

  <div class="container">
    <nav>
      <div class="nav-left">
        <button class="burger-menu-btn" id="burger-menu-btn">&#9776;</button>
        <a href="{{SITE_ROOT}}" class="logo">S&R Travel Blog</a>
      </div>
      <div class="lang-switch">
        <a href="{{EN_URL}}" class="{{EN_ACTIVE}}">EN</a>
        <a href="{{ES_URL}}" class="{{ES_ACTIVE}}">ES</a>
      </div>
    </nav>

    <main>
      <section class="hero">
        <h1>{{TRIP_TITLE}}</h1>
        <p>{{TRIP_DATE}}</p>
      </section>

      <section class="posts-grid">
        {{POSTS}}
      </section>
    </main>

    <footer>
      &copy; 2026 Travel Blog. All rights reserved.
    </footer>
  </div>

  <script src="{{ASSET_PATH}}assets/main.js"></script>
</body>

</html>
